<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Open Source Game Vault catalog badges</title>
  <desc id="desc">Original visual badges for classic open-source engine launcher entries.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#111514"/>
      <stop offset="0.58" stop-color="#171817"/>
      <stop offset="1" stop-color="#231d16"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" x2="1">
      <stop offset="0" stop-color="#e2b15f"/>
      <stop offset="1" stop-color="#b85b3d"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" x2="1">
      <stop offset="0" stop-color="#6dd7c8"/>
      <stop offset="1" stop-color="#2f837d"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" x2="1">
      <stop offset="0" stop-color="#b7acd7"/>
      <stop offset="1" stop-color="#5d5589"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <style>
      .title { fill: #eee7d8; font: 700 34px Inter, system-ui, sans-serif; }
      .subtitle { fill: #aaa08d; font: 17px Inter, system-ui, sans-serif; }
      .card { fill: rgba(238, 231, 216, 0.045); stroke: rgba(238, 231, 216, 0.16); stroke-width: 1.4; }
      .name { fill: #eee7d8; font: 700 20px Inter, system-ui, sans-serif; }
      .meta { fill: #aaa08d; font: 13px Inter, system-ui, sans-serif; }
      .small { fill: #aaa08d; font: 12px Inter, system-ui, sans-serif; }
      .line { stroke: rgba(238, 231, 216, 0.22); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; fill: none; }
      .thin { stroke: rgba(238, 231, 216, 0.15); stroke-width: 1; }
      .teal { stroke: #6dd7c8; }
      .amber { stroke: #e2b15f; }
      .violet { stroke: #b7acd7; }
    </style>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>
  <path d="M0 96H1200M0 480H1200M360 0V720M840 0V720" class="thin"/>
  <circle cx="1060" cy="110" r="170" fill="#6dd7c8" opacity="0.06"/>
  <circle cx="120" cy="650" r="210" fill="#e2b15f" opacity="0.05"/>

  <text x="48" y="64" class="title">Open Source Game Vault</text>
  <text x="48" y="94" class="subtitle">Original visual badges for engines, source ports, and user-provided assets.</text>
  <text x="1035" y="70" class="subtitle">By nonoxz</text>

  <g filter="url(#shadow)">
    <g transform="translate(48 132)">
      <rect class="card" width="240" height="150" rx="10"/>
      <rect x="18" y="18" width="72" height="72" rx="8" fill="#1b1d1d"/>
      <path d="M54 75c-18-18 8-28-1-49 20 19 32 40 1 49Z" fill="url(#amber)"/>
      <path d="M35 74c11 7 27 8 42 0" class="line amber"/>
      <text x="108" y="46" class="name">Doom / Freedoom</text>
      <text x="108" y="72" class="meta">BSP FPS · WAD</text>
      <text x="20" y="124" class="small">Free WADs and source-port runners</text>
    </g>

    <g transform="translate(328 132)">
      <rect class="card" width="240" height="150" rx="10"/>
      <rect x="18" y="18" width="72" height="72" rx="8" fill="#1b1d1d"/>
      <path d="M54 28v52M28 54h52M36 36l36 36M72 36 36 72" class="line teal"/>
      <circle cx="54" cy="54" r="20" class="line teal"/>
      <text x="108" y="46" class="name">Wolfenstein 3D</text>
      <text x="108" y="72" class="meta">Raycasting · WL6</text>
      <text x="20" y="124" class="small">Pseudo-3D corridors, early FPS history</text>
    </g>

    <g transform="translate(608 132)">
      <rect class="card" width="240" height="150" rx="10"/>
      <rect x="18" y="18" width="72" height="72" rx="8" fill="#1b1d1d"/>
      <path d="M33 74V47h14v27M51 74V32h16v42M70 74V52h10v22" class="line teal"/>
      <path d="M27 74h58" class="line amber"/>
      <text x="108" y="46" class="name">Micropolis</text>
      <text x="108" y="72" class="meta">City sim · GPL</text>
      <text x="20" y="124" class="small">Zones, budgets, city grids</text>
    </g>

    <g transform="translate(888 132)">
      <rect class="card" width="240" height="150" rx="10"/>
      <rect x="18" y="18" width="72" height="72" rx="8" fill="#1b1d1d"/>
      <ellipse cx="54" cy="54" rx="28" ry="11" class="line violet"/>
      <ellipse cx="54" cy="54" rx="11" ry="28" class="line violet"/>
      <circle cx="54" cy="54" r="6" fill="#e2b15f"/>
      <text x="108" y="46" class="name">Quake I / II / III</text>
      <text x="108" y="72" class="meta">3D engines · PAK</text>
      <text x="20" y="124" class="small">True 3D and network-era engines</text>
    </g>

    <g transform="translate(48 324)">
      <rect class="card" width="240" height="150" rx="10"/>
      <rect x="18" y="18" width="72" height="72" rx="8" fill="#1b1d1d"/>
      <path d="M54 72V33M34 50h40M34 50l-12 18M74 50l12 18" class="line amber"/>
      <circle cx="54" cy="33" r="10" class="line amber"/>
      <text x="108" y="46" class="name">C&amp;C / Red Alert</text>
      <text x="108" y="72" class="meta">RTS · MIX</text>
      <text x="20" y="124" class="small">Radar, bases, factions, maps</text>
    </g>

    <g transform="translate(328 324)">
      <rect class="card" width="240" height="150" rx="10"/>
      <rect x="18" y="18" width="72" height="72" rx="8" fill="#1b1d1d"/>
      <path d="M54 28l10 28-10 28-10-28Z" fill="url(#violet)"/>
      <path d="M32 58c14-18 30-18 44 0M31 72c17-9 30-9 47 0" class="line teal"/>
      <text x="108" y="46" class="name">Homeworld</text>
      <text x="108" y="72" class="meta">Space RTS · BIG</text>
      <text x="20" y="124" class="small">Fleet command and 3D strategy</text>
    </g>

    <g transform="translate(608 324)">
      <rect class="card" width="240" height="150" rx="10"/>
      <rect x="18" y="18" width="72" height="72" rx="8" fill="#1b1d1d"/>
      <path d="M36 78 72 28M72 78 36 28" class="line amber"/>
      <path d="M34 78h40M38 28h32" class="line teal"/>
      <text x="108" y="46" class="name">Prince</text>
      <text x="108" y="72" class="meta">Platformer · data</text>
      <text x="20" y="124" class="small">Jumps, traps, historical source</text>
    </g>

    <g transform="translate(888 324)">
      <rect class="card" width="240" height="150" rx="10"/>
      <rect x="18" y="18" width="72" height="72" rx="8" fill="#1b1d1d"/>
      <path d="M31 72c12-31 34-31 46 0" class="line teal"/>
      <path d="M34 72h40M54 33v39" class="line violet"/>
      <circle cx="54" cy="33" r="14" class="line violet"/>
      <text x="108" y="46" class="name">Marathon</text>
      <text x="108" y="72" class="meta">Sci-fi FPS · scenario</text>
      <text x="20" y="124" class="small">Aleph One, terminals, scenarios</text>
    </g>

    <g transform="translate(328 516)">
      <rect class="card" width="240" height="150" rx="10"/>
      <rect x="18" y="18" width="72" height="72" rx="8" fill="#1b1d1d"/>
      <circle cx="54" cy="54" r="26" class="line amber"/>
      <circle cx="54" cy="54" r="10" class="line teal"/>
      <path d="M54 28v52M28 54h52" class="line amber"/>
      <text x="108" y="46" class="name">Duke 3D</text>
      <text x="108" y="72" class="meta">Build FPS · GRP</text>
      <text x="20" y="124" class="small">Build-engine maps and user data</text>
    </g>

    <g transform="translate(608 516)">
      <rect class="card" width="520" height="150" rx="10"/>
      <text x="24" y="44" class="name">Legal-first launcher</text>
      <text x="24" y="74" class="meta">Original badges only. Commercial screenshots stay out of the repository.</text>
      <path d="M28 110h458" class="line teal"/>
      <circle cx="496" cy="110" r="8" fill="#6dd7c8"/>
    </g>
  </g>
</svg>
